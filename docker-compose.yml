services:
  # ------------------------------------------------------------------
  # docling-serve — official IBM Docling HTTP service (CPU-only build).
  # Image: ghcr.io/docling-project/docling-serve-cpu (~4.4 GB)
  # Internal port: 5001 — only the backend talks to this service.
  # ------------------------------------------------------------------
  docling:
    image: ghcr.io/docling-project/docling-serve-cpu:latest
    container_name: report-checker-docling
    restart: unless-stopped
    environment:
      - DOCLING_SERVE_ENABLE_UI=0
      - DOCLING_SERVE_MAX_SYNC_WAIT=3600

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
      args:
        PYTHON_IMAGE: ${DOCKER_PYTHON_IMAGE:-python:3.12-slim}
    container_name: report-checker-backend
    # Access to mounted filer paths may require host owner uid/gid.
    # Default 0:0 avoids Permission denied on restrictive network shares.
    user: "${BACKEND_UID:-0}:${BACKEND_GID:-0}"
    restart: unless-stopped
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-lm-studio}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-http://host.docker.internal:1234/v1}
      # OPENAI_VALIDATE_BASE_URL — отдельный эндпоинт для AI-валидации диапазонов.
      # Если не задан, используется OPENAI_BASE_URL.
      # Пример: http://host.docker.internal:1235/v1  (отдельный LM Studio с маленькой моделью)
      - OPENAI_VALIDATE_BASE_URL=${OPENAI_VALIDATE_BASE_URL:-}
      # OPENAI_MODEL — примеры имён (копировать одну строку):
      #   qwen3-coder-30b-a3b-instruct
      #   qwen3.6-35b-a3b
      #   qwen/qwen2.5-coder-32b
      #   qwen/qwen3-4b-2507
      # OPENAI_VALIDATE_MODEL — примеры:
      #   qwen/qwen3-4b-2507
      - OPENAI_MODEL=${OPENAI_MODEL:-qwen3.6-35b-a3b}
      - OPENAI_VALIDATE_MODEL=${OPENAI_VALIDATE_MODEL:-qwen/qwen3-4b-2507}
      - AI_TIMEOUT=${AI_TIMEOUT:-0}
      - AI_CONNECT_TIMEOUT=${AI_CONNECT_TIMEOUT:-15}
      - DOC_CHUNK_SIZE=${DOC_CHUNK_SIZE:-10000}
      - MAX_CHUNK_TOKENS=${MAX_CHUNK_TOKENS:-3000}
      - DOCLING_URL=${DOCLING_URL:-http://docling:5001}
      - DOCLING_TIMEOUT=${DOCLING_TIMEOUT:-300}
      # Кеш MD по SHA-256 исходного .docx (см. backend/md_cache.py). Именованный volume переживает перезапуск контейнера.
      - MD_CACHE_DIR=${MD_CACHE_DIR:-/var/lib/report-checker/md_cache}
      - OUTPUT_BASE_DIR=${OUTPUT_BASE_DIR:-/output}
      - WORKER_SERVERS=${WORKER_SERVERS:-}
    volumes:
      # Host path roots used by backend/app/path_mapping.json (U:\ and P:\ drives).
      # Keep these mounts writable: backend creates artifact folders/logs in output_dir.
      - ${HOST_STORAGE_U:-/filer/users/rymax1e}:/filer/users/rymax1e
      - ${HOST_STORAGE_P:-/filer/wps/wp}:/filer/wps/wp
      - report_checker_md_cache:/var/lib/report-checker/md_cache
      - report_checker_output:/output
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - docling

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${DOCKER_NODE_IMAGE:-node:20-slim}
        NGINX_IMAGE: ${DOCKER_NGINX_IMAGE:-nginx:alpine}
    container_name: report-checker-frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5173}:8080"
    depends_on:
      - backend

volumes:
  report_checker_md_cache:
  report_checker_output:
