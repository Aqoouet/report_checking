services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
      args:
        PYTHON_IMAGE: ${DOCKER_PYTHON_IMAGE:-python:3.12-slim}
    container_name: report-checker-backend
    restart: unless-stopped
    environment:
      # LM Studio runs on the host — use host.docker.internal to reach it
      - OPENAI_API_KEY=${OPENAI_API_KEY:-lm-studio}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-http://host.docker.internal:1234/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-qwen3-4b}
      # Range validation uses a small model id from LM Studio (/v1/models). Override if needed.
      - OPENAI_VALIDATE_MODEL=${OPENAI_VALIDATE_MODEL:-qwen/qwen3-4b-2507}
      - SYSTEM_PROMPT=${SYSTEM_PROMPT}
      - AI_TIMEOUT=${AI_TIMEOUT:-0}
      - AI_CONNECT_TIMEOUT=${AI_CONNECT_TIMEOUT:-15}
      - DOC_CHUNK_SIZE=${DOC_CHUNK_SIZE:-10000}
      - AI_CHUNK_MAX_TOKENS=${AI_CHUNK_MAX_TOKENS:-300}
      - AI_REF_MAX_TOKENS=${AI_REF_MAX_TOKENS:-8192}
      - AI_AGG_MAX_TOKENS=${AI_AGG_MAX_TOKENS:-250}
    volumes:
      # Host report paths (e.g. path_mapping → /filer/users/rymax1e/...) must exist inside the container
      - /filer/users/rymax1e:/filer/users/rymax1e:ro
    extra_hosts:
      # Needed on Linux so host.docker.internal resolves to the host
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${DOCKER_NODE_IMAGE:-node:20-alpine}
        NGINX_IMAGE: ${DOCKER_NGINX_IMAGE:-nginx:alpine}
    container_name: report-checker-frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5173}:80"
    depends_on:
      - backend
