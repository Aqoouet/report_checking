services:
  # ------------------------------------------------------------------
  # docling-serve — official IBM Docling HTTP service (CPU-only build).
  # Image: ghcr.io/docling-project/docling-serve-cpu (~4.4 GB)
  # Internal port: 5001 — only the backend talks to this service.
  # ------------------------------------------------------------------
  docling:
    image: ghcr.io/docling-project/docling-serve-cpu:latest
    container_name: report-checker-docling
    restart: unless-stopped
    environment:
      - DOCLING_SERVE_ENABLE_UI=0
      - DOCLING_SERVE_MAX_SYNC_WAIT=3600

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
      args:
        PYTHON_IMAGE: ${DOCKER_PYTHON_IMAGE:-python:3.12-slim}
    container_name: report-checker-backend
    restart: unless-stopped
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-lm-studio}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-http://host.docker.internal:1234/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-qwen3-coder-30b-a3b-instruct}
      - OPENAI_VALIDATE_MODEL=${OPENAI_VALIDATE_MODEL:-qwen/qwen3-4b-2507}
      - AI_TIMEOUT=${AI_TIMEOUT:-0}
      - AI_CONNECT_TIMEOUT=${AI_CONNECT_TIMEOUT:-15}
      - DOC_CHUNK_SIZE=${DOC_CHUNK_SIZE:-10000}
      - DOCLING_URL=${DOCLING_URL:-http://docling:5001}
      - DOCLING_TIMEOUT=${DOCLING_TIMEOUT:-300}
    volumes:
      - /filer/users/rymax1e:/filer/users/rymax1e:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - docling

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${DOCKER_NODE_IMAGE:-node:20-slim}
        NGINX_IMAGE: ${DOCKER_NGINX_IMAGE:-nginx:alpine}
    container_name: report-checker-frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5173}:80"
    depends_on:
      - backend
