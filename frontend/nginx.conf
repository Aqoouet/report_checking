server {
    listen 80;
    # Default nginx limit is 1m; PDFs are often larger
    client_max_body_size 100M;

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # proxy API calls to backend so the browser never touches a different origin
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_read_timeout 600s;
    }
}
