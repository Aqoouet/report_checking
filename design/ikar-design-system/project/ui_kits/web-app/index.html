<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Ikar · Проверка отчёта</title>
<link rel="icon" href="../../assets/logo.svg">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--font-body);
  background:var(--ink-950);color:var(--white);min-height:100vh;
  --fg-1:var(--white);--fg-2:var(--ink-200);--fg-3:var(--ink-400);
  --bg:var(--ink-950);--card:var(--ink-800);--border:var(--ink-600);
  --primary:var(--ikar-orange-500);--primary-hover:var(--ikar-orange-600);
}
.page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;gap:14px;}
.card{background:var(--ink-800);border:1px solid var(--ink-600);border-radius:var(--radius-sm);box-shadow:var(--shadow-md);padding:40px 44px;width:100%;max-width:520px;}
.card--wide{max-width:820px;padding:40px 44px 36px;}
.title{font-family:var(--font-display);font-size:1.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--white);margin-bottom:8px;}
.action-row{display:flex;gap:12px;margin:20px 0 0;}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:11px 20px;border-radius:var(--radius-sm);font-family:var(--font-display);font-size:.9rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;border:none;text-decoration:none;transition:background var(--motion-fast),opacity var(--motion-fast);}
.btn--primary{background:var(--ikar-orange-500);color:#fff;}
.btn--primary:hover:not(:disabled){background:var(--ikar-orange-600);}
.btn--primary:disabled{opacity:.45;cursor:not-allowed;}
.btn--secondary{background:var(--ink-700);color:var(--ink-100);border:1px solid var(--ink-600);}
.btn--secondary:hover{background:var(--ink-600);}
.btn--danger{background:#c0392b;color:#fff;}
.btn--danger:hover:not(:disabled){background:#a93226;}
.btn--danger:disabled{opacity:.6;cursor:not-allowed;}
.btn--outline{background:transparent;border:1.5px solid var(--ink-600);color:var(--ink-100);}
.btn--outline:hover{background:var(--ink-700);border-color:var(--ink-400);}
.btn--sm{padding:5px 12px;font-size:.78rem;border-radius:var(--radius-sm);}

/* Inputs */
.input{border:1.5px solid var(--ink-600);border-radius:var(--radius-sm);padding:10px 14px;font-size:.95rem;background:var(--ink-900);color:var(--white);outline:none;transition:border-color var(--motion-fast);font-family:var(--font-body);}
.input:focus{border-color:var(--ikar-orange-500);box-shadow:var(--shadow-focus);}
.input--valid{border-color:#27ae60;}
.input--invalid{border-color:var(--red-500);}
.field{display:flex;flex-direction:column;gap:6px;}
.label{font-size:.875rem;font-weight:500;color:var(--ink-200);}

/* Jobs */
.jobs-section{margin-top:28px;}
.jobs-section-title{font-family:var(--font-display);font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--ikar-orange-500);margin-bottom:10px;}
.jobs-empty{font-size:.875rem;color:var(--ink-400);padding:12px 0;}
.job-list{display:flex;flex-direction:column;gap:8px;}
.job-row{background:var(--ink-700);border:1px solid var(--ink-600);border-radius:var(--radius-sm);padding:12px 14px;display:flex;flex-direction:column;gap:8px;transition:border-color var(--motion-fast);}
.job-row--processing{border-color:var(--ikar-orange-500);}
.job-row--done{border-color:#27ae60;}
.job-row--error{border-color:#c0392b;}
.job-row-header{display:flex;align-items:center;gap:10px;}
.job-docx-name{flex:1;font-size:.875rem;font-weight:500;color:var(--white);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.job-status{font-family:var(--font-display);font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:2px 8px;border-radius:var(--radius-sm);white-space:nowrap;}
.job-status--pending{background:var(--ink-600);color:var(--ink-300);}
.job-status--processing{background:rgba(242,101,34,.18);color:var(--ikar-orange-400);}
.job-status--done{background:rgba(39,174,96,.18);color:#2ecc71;}
.job-status--error{background:rgba(192,57,43,.2);color:#e74c3c;}
.job-status--cancelled{background:rgba(255,255,255,.06);color:var(--ink-400);}
.job-time{font-family:var(--font-mono);font-size:.72rem;color:var(--ink-400);white-space:nowrap;}
.job-queue-pos{font-size:.8rem;color:var(--ink-400);}
.job-progress{display:flex;flex-direction:column;gap:6px;}
.job-phase{font-family:var(--font-mono);font-size:.78rem;color:var(--ink-300);}
.job-progress-count{font-family:var(--font-mono);font-size:.72rem;color:var(--ink-400);text-align:right;}
.job-error-msg{font-size:.8rem;color:#e74c3c;line-height:1.4;}
.job-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.job-artifact-text{margin-top:6px;font-size:.78rem;color:var(--ink-400);word-break:break-all;}
.job-artifact-link{color:var(--ink-400);text-decoration:none;}
.job-artifact-link:hover{color:var(--ikar-orange-400);text-decoration:underline;}
.job-log-panel{margin-top:8px;padding:10px 12px;background:var(--ink-950);color:var(--ink-300);font-family:var(--font-mono);font-size:.75rem;line-height:1.5;border-radius:var(--radius-sm);border:1px solid var(--ink-700);max-height:260px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;}

.progress-bar{width:100%;height:4px;background:var(--ink-600);border-radius:var(--radius-xs);overflow:hidden;}
.progress-fill{height:100%;background:var(--ikar-orange-500);border-radius:var(--radius-xs);transition:width .4s ease;}

.start-error{margin-top:12px;padding:10px 14px;background:rgba(192,57,43,.18);border:1px solid #c0392b;border-radius:var(--radius-sm);color:#e74c3c;font-size:.875rem;line-height:1.45;}

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;backdrop-filter:blur(4px);}
.modal-box{background:var(--ink-800);border:1px solid var(--ink-600);border-radius:var(--radius-sm);box-shadow:0 24px 64px rgba(0,0,0,.5);width:100%;max-width:560px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;}
.modal-box--wide{max-width:960px;}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;padding:20px 24px 16px;border-bottom:1px solid var(--ink-600);flex-shrink:0;}
.modal-header-left{display:flex;flex-direction:column;gap:2px;}
.modal-title{font-family:var(--font-display);font-size:1.1rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--white);line-height:1.3;}
.modal-subtitle{font-size:.8rem;color:var(--ink-400);}
.modal-close{background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--ink-400);padding:4px 6px;border-radius:var(--radius-sm);line-height:1;transition:background var(--motion-fast),color var(--motion-fast);flex-shrink:0;margin-left:12px;}
.modal-close:hover{background:var(--ink-700);color:var(--white);}
.modal-footer{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;padding:16px 24px;border-top:1px solid var(--ink-600);flex-shrink:0;}
.modal-footer-group{display:flex;align-items:center;flex-wrap:wrap;gap:10px;}

/* Config form */
.cfg-form{display:flex;flex-direction:column;gap:18px;padding:18px 24px;overflow-y:auto;}
.cfg-form-field{display:flex;flex-direction:column;gap:8px;}
.cfg-field-head{display:flex;align-items:center;gap:12px;}
.cfg-field-label{display:inline-flex;align-items:center;gap:6px;font-size:.88rem;font-weight:600;color:var(--ink-100);}
.cfg-field-input-row{display:flex;align-items:flex-start;gap:10px;}
.cfg-input,.cfg-textarea{width:100%;border:1.5px solid var(--ink-600);border-radius:var(--radius-sm);padding:10px 12px;font-size:.92rem;color:var(--white);background:var(--ink-900);outline:none;transition:border-color var(--motion-fast),box-shadow var(--motion-fast);font-family:var(--font-body);}
.cfg-input:focus,.cfg-textarea:focus{border-color:var(--ikar-orange-500);box-shadow:var(--shadow-focus);}
.cfg-input--readonly{background:var(--ink-800);color:var(--ink-400);cursor:not-allowed;}
.cfg-textarea{min-height:120px;resize:vertical;line-height:1.5;font-family:var(--font-mono);}
.cfg-icon-btn{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:var(--radius-sm);border:1px solid var(--ink-600);background:var(--ink-700);color:var(--ink-100);cursor:pointer;flex-shrink:0;transition:all var(--motion-fast);}
.cfg-icon-btn--help{width:24px;height:24px;border-radius:var(--radius-pill);font-size:.72rem;}
.cfg-icon-btn:hover:not(:disabled){border-color:var(--ikar-orange-500);background:var(--ink-600);color:var(--ikar-orange-400);}
.cfg-inline-panel{border-radius:var(--radius-sm);padding:10px 12px;font-size:.82rem;line-height:1.55;}
.cfg-inline-panel--help{background:var(--ink-900);border:1px solid var(--ink-600);color:var(--ink-300);}
.cfg-field-result{border-radius:var(--radius-sm);padding:9px 12px;font-size:.82rem;line-height:1.45;}
.cfg-field-result--success{background:rgba(39,174,96,.15);border:1px solid #27ae60;color:#2ecc71;}

@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="Atoms.jsx"></script>
<script type="text/babel" src="JobRow.jsx"></script>
<script type="text/babel" src="ConfigDialog.jsx"></script>
<script type="text/babel" src="App.jsx"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
